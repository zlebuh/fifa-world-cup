name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: preview-pr-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    name: Deploy preview
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          BASE_PATH: /fifa-world-cup/pr-${{ github.event.number }}/

      - name: Deploy preview to gh-pages/pr-${{ github.event.number }}
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          target-folder: pr-${{ github.event.number }}
          clean: true

      - name: Post or update preview URL comment
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- preview-url -->'
            const prNumber = context.issue.number
            const sha = context.sha.substring(0, 7)
            const url = `https://zlebuh.github.io/fifa-world-cup/pr-${prNumber}/`
            const body = [
              marker,
              '## Preview deployment',
              '',
              `🔗 **[View preview](${url})**`,
              '',
              `Deployed from commit \`${sha}\``,
            ].join('\n')

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            })
            const existing = comments.find(c => c.body?.includes(marker))

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              })
            }

  cleanup-preview:
    name: Clean up preview
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Remove PR preview directory from gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git ls-remote --exit-code origin gh-pages > /dev/null 2>&1; then
            git fetch origin gh-pages
            git checkout gh-pages
            if [ -d "pr-${{ github.event.number }}" ]; then
              git rm -rf "pr-${{ github.event.number }}"
              git commit -m "Remove preview for PR #${{ github.event.number }}"
              git push
            fi
          fi
